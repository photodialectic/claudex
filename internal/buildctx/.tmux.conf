# Modern tmux configuration as an alternative to screen

# Set prefix key to Ctrl-a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Disable mouse; avoids conflicts with some TUIs
set -g mouse off

# Use tmux-native term and enable proper truecolor
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 32000

# Reduce escape time for faster command execution
set -s escape-time 10

# Disable focus events; some TUIs misbehave
set -g focus-events off

# Avoid aggressive resize; can confuse TUIs
# setw -g aggressive-resize on

# Key bindings
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with vim-like keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim-like keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows to last used
bind l last-window
bind tab next-window

# Reload config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Copy mode with vim bindings
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# Enable mouse drag to select text in copy mode
unbind -T copy-mode-vi MouseDragEnd1Pane
# allow copying to system clipboard on mouse selection (macOS) - maybe later
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'

# Minimal status bar (reduce styling interference)
set -g status on
set -g status-style default
set -g status-left ''
set -g status-right ''

# Signal shells inside tmux to use a simple prompt (avoid p10k issues in web terminals)
set-environment -g TMUX_SIMPLE_PROMPT 1

# Use defaults for window status
# setw -g window-status-current-format ' #I:#W '
# setw -g window-status-format ' #I:#W '

# Default pane border styles
set -g pane-border-style default
set -g pane-active-border-style default

# Default message styling
set -g message-style default

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Plugin manager (optional - requires TPM)
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom)
# run '~/.tmux/plugins/tpm/tpm'
